
stages:
  - lint
  - test
  - security
  - quality-gate
  - build
  - deploy

variables:
  MINIO_ENDPOINT: "http://10.98.20.211:9000"
  MINIO_ACCESS_KEY: "minio"
  MINIO_SECRET_KEY: "minio123"
  SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
  GIT_DEPTH: "0"

# ===========================================================================
# STAGE 1 : Linting avec Ruff
# ===========================================================================
ruff-lint:
  stage: lint
  tags:
    - mlops
  script:
    - pip install ruff --user
    - ruff check "mlops pipelines/components/" --output-format=gitlab
  allow_failure: false

# ===========================================================================
# STAGE 2 : Tests unitaires + couverture + mypy + bandit
# ===========================================================================
pytest:
  stage: test
  tags:
    - mlops
  script:
    - pip install pytest pytest-cov mypy --user
    - pip install pandas numpy scikit-learn --user
    - pytest "mlops pipelines/tests/"
      --junitxml=pytest-report.xml
      --cov="mlops pipelines/components"
      --cov-report=xml:coverage.xml
      --cov-report=term-missing
  artifacts:
    reports:
      junit: pytest-report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
      - pytest-report.xml
    when: always
    expire_in: 7 days
  allow_failure: false

mypy-check:
  stage: test
  tags:
    - mlops
  script:
    - pip install mypy --user
    - mypy "mlops pipelines/components/" --ignore-missing-imports
  allow_failure: true

# ===========================================================================
# STAGE 3 : Sécurité avec Bandit
# ===========================================================================
bandit-security:
  stage: security
  tags:
    - mlops
  script:
    - pip install bandit --user
    - bandit -r "mlops pipelines/components/"
      -f json -o bandit-report.json
      --severity-level medium || true
    - bandit -r "mlops pipelines/components/"
      -f screen --severity-level medium
  artifacts:
    paths:
      - bandit-report.json
    when: always
    expire_in: 7 days
  allow_failure: false

# ===========================================================================
# STAGE 4 : SonarQube Quality Gate
# ===========================================================================
sonarqube:
  stage: quality-gate
  tags:
    - mlops
  # image:
  #   name: sonarsource/sonar-scanner-cli:11
  #   entrypoint: [""]
  # cache:
  #   policy: pull-push
  #   key: "sonar-cache-$CI_COMMIT_REF_SLUG"
  #   paths:
  #     - "${SONAR_USER_HOME}/cache"
  #     - sonar-scanner/
  script:
    - /opt/sonar-scanner/bin/sonar-scanner -Dsonar.host.url="${SONAR_HOST_URL}"
  dependencies:
    - pytest
    - bandit-security
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
    - if: $CI_COMMIT_BRANCH == 'develop'

# ===========================================================================
# STAGE 5 : Build Docker images
# ===========================================================================
build_images:
  stage: build
  tags:
    - mlops
  script:
    - docker build -t localhost:5000/preprocessing:latest
      "./mlops pipelines/components/preprocessing"
    - docker push localhost:5000/preprocessing:latest
    - docker build -t localhost:5000/training:latest
      "./mlops pipelines/components/healthscore_training"
    - docker push localhost:5000/training:latest
    - docker build -t localhost:5000/rag-diagnostic:latest
      "./mlops pipelines/components/root_cause"
    - docker push localhost:5000/rag-diagnostic:latest
    - docker build -t localhost:5000/predict-scenario3:latest
      "./mlops pipelines/components/predicition_proactive"
    - docker push localhost:5000/predict-scenario3:latest
  only:
    - main

# ===========================================================================
# STAGE 6 : Deploy Kubeflow
# ===========================================================================
deploy_kubeflow:
  stage: deploy
  tags:
    - mlops
  script:
    - echo "Deploy pipeline Kubeflow - a completer sprint suivant"
  only:
    - main